name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install action dependencies
        run: pnpm install --frozen-lockfile

      - name: Build GitHub Action bundle
        run: pnpm --filter @canopy/github-action build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p canopy --target "${{ matrix.target }}"

      - name: Package archive
        run: tar -C "target/${{ matrix.target }}/release" -czf "canopy-${{ matrix.target }}.tar.gz" canopy

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: canopy-${{ matrix.target }}.tar.gz
